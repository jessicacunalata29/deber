name: JavaScript application

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install dependencies
      run: npm install

    ##- name: Ejecutar aplicación
      ##run: node app.js

    - name: Ejecutar pruebas
      run: npm test

    - name: Simular el deploy
      run: echo "Simular que se esta desplegando"

    - name: Construir la imagen de Docker
      run: docker build -t ghcr.io/jessicacunalata29/hello-jessica-js:1.0.0 .

    - name: Login en Github Container Registry
      run: echo "${{ secrets.GHCR-TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen
      run: docker push ghcr.io/jessicacunalata29/hello-jessica-js:1.0.0